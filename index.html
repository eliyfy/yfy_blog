<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>芸芣苡</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:opsz@14..32&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; -webkit-text-size-adjust:100%; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            transition: background .35s, color .35s;
            -webkit-font-smoothing: antialiased;
        }
        a { color:inherit; text-decoration:none; }
        button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; font-size:inherit; }
        input, textarea { font-family:inherit; font-size:inherit; }
        ::selection { background:var(--accent); color:var(--bg); }

        /* ===== Theme ===== */
        :root {
            --bg: #f6f2ec;
            --bg-card: #fefcf8;
            --bg-soft: #ede8e1;
            --text: #2c2416;
            --text-secondary: #8c7a6b;
            --text-dim: #b5a698;
            --border: #dcd3c9;
            --accent: #4a3728;
            --accent-hover: #2c2416;
            --shadow: 0 1px 4px rgba(0,0,0,.04);
            --font-serif: 'Noto Serif SC', 'Georgia', serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        [data-theme="dark"] {
            --bg: #181510;
            --bg-card: #221e18;
            --bg-soft: #2a251e;
            --text: #d9d0c4;
            --text-secondary: #8c7a6b;
            --text-dim: #5a4e42;
            --border: #332c24;
            --accent: #d9d0c4;
            --accent-hover: #f0e6d8;
            --shadow: 0 1px 6px rgba(0,0,0,.3);
        }

        /* ===== Layout ===== */
        .page { max-width:720px; margin:0 auto; padding:0 24px; min-height:100vh; display:flex; flex-direction:column; }

        /* ===== Header ===== */
        .header {
            padding:32px 0 20px;
            display:flex; align-items:baseline; justify-content:space-between;
            border-bottom:1px solid var(--border);
            flex-wrap:wrap; gap:12px;
        }
        .blog-title {
            font-family:var(--font-serif);
            font-size:1.3rem; font-weight:700;
            letter-spacing:4px;
            color:var(--text);
        }
        .blog-title:hover { opacity:.7; }
        .nav { display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
        .nav a, .nav button {
            padding:6px 14px; border-radius:4px;
            font-size:.82rem; font-weight:450;
            color:var(--text-secondary);
            transition:background .2s, color .2s;
        }
        .nav a:hover, .nav button:hover { background:var(--bg-soft); color:var(--text); }
        .nav .active { color:var(--text); background:var(--bg-soft); }
        .nav-sep { width:1px; height:16px; background:var(--border); margin:0 4px; }
        .theme-btn { font-size:.85rem; padding:6px 10px; }

        /* ===== Views ===== */
        .view { display:none; padding:48px 0 60px; flex:1; }
        .view.active { display:block; animation:fadeIn .3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        /* ===== Home ===== */
        .home-hero { padding:60px 0 48px; text-align:center; }
        .home-name {
            font-family:var(--font-serif);
            font-size:clamp(2.4rem,6vw,3.6rem);
            font-weight:700; letter-spacing:8px;
            color:var(--text); line-height:1.3;
        }
        .home-quote {
            margin-top:20px;
            font-family:var(--font-serif);
            font-size:1rem; font-weight:400;
            color:var(--text-secondary);
            min-height:1.6em;
            transition:opacity .4s;
        }
        .home-quote.loading { opacity:.3; }
        .home-divider {
            width:40px; height:1px; background:var(--border);
            margin:36px auto;
        }
        .home-sections {
            display:flex; flex-direction:column; gap:2px;
            max-width:320px; margin:0 auto;
        }
        .home-sections a {
            display:flex; align-items:center; justify-content:space-between;
            padding:14px 0;
            font-size:.95rem; font-weight:450;
            color:var(--text);
            border-bottom:1px solid var(--border);
            transition:opacity .2s;
        }
        .home-sections a:last-child { border-bottom:none; }
        .home-sections a:hover { opacity:.6; }
        .home-sections .arrow { color:var(--text-dim); font-family:var(--font-serif); font-size:.8rem; }

        .home-recent { margin-top:48px; }
        .home-recent-label {
            font-size:.75rem; font-weight:500;
            color:var(--text-dim); letter-spacing:2px; text-transform:uppercase;
            margin-bottom:12px;
        }
        .home-recent-item {
            padding:16px 0; border-bottom:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:baseline; gap:16px;
        }
        .home-recent-item:last-child { border:none; }
        .home-recent-item .title { font-size:.95rem; font-weight:450; color:var(--text); }
        .home-recent-item .date { font-size:.78rem; color:var(--text-dim); white-space:nowrap; }
        .home-recent-empty {
            font-size:.85rem; color:var(--text-dim);
            padding:12px 0;
        }

        /* ===== Articles ===== */
        .page-header {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:32px; flex-wrap:wrap; gap:12px;
        }
        .page-header h2 {
            font-family:var(--font-serif);
            font-size:1.5rem; font-weight:600;
            color:var(--text);
        }
        .article-item {
            padding:20px 0; border-bottom:1px solid var(--border);
            cursor:default;
        }
        .article-item:last-child { border:none; }
        .article-item .art-title {
            font-size:1.05rem; font-weight:550;
            color:var(--text); line-height:1.4;
            margin-bottom:6px;
        }
        .article-item .art-title.clickable { cursor:pointer; }
        .article-item .art-title.clickable:hover { opacity:.7; }
        .article-item .art-meta {
            font-size:.78rem; color:var(--text-dim);
            display:flex; gap:16px; align-items:center;
        }
        .article-item .art-meta .tag {
            font-size:.7rem; padding:1px 10px;
            border:1px solid var(--border); border-radius:3px;
            color:var(--text-secondary);
        }
        .article-item .art-actions { display:flex; gap:8px; margin-top:8px; }
        .article-item .art-actions button {
            font-size:.75rem; padding:4px 12px; border-radius:3px;
            border:1px solid var(--border); color:var(--text-secondary);
            transition:background .2s;
        }
        .article-item .art-actions button:hover { background:var(--bg-soft); color:var(--text); }
        .article-item .art-actions .del-btn:hover { color:#b91c1c; border-color:#b91c1c; }
        .empty-state {
            text-align:center; padding:60px 0;
            color:var(--text-dim); font-size:.9rem;
        }

        /* ===== Article Detail Modal ===== */
        .modal-overlay {
            display:none; position:fixed; inset:0; z-index:900;
            background:rgba(0,0,0,.3); backdrop-filter:blur(4px);
            align-items:flex-start; justify-content:center;
            padding:60px 24px 40px; overflow-y:auto;
        }
        .modal-overlay.open { display:flex; }
        .modal {
            background:var(--bg-card); border:1px solid var(--border);
            max-width:640px; width:100%; padding:40px;
            border-radius:4px; position:relative;
            animation:fadeIn .25s ease;
            margin-bottom:40px;
        }
        .modal-close {
            position:absolute; top:16px; right:16px;
            width:32px; height:32px; display:grid; place-items:center;
            font-size:1.2rem; color:var(--text-dim);
            border-radius:50%; transition:background .2s;
        }
        .modal-close:hover { background:var(--bg-soft); }
        .modal h2 {
            font-family:var(--font-serif); font-size:1.4rem; font-weight:600;
            margin-bottom:6px; color:var(--text);
        }
        .modal .art-meta {
            font-size:.8rem; color:var(--text-dim); margin-bottom:20px;
        }
        .modal .art-content {
            font-size:.95rem; line-height:1.9;
            color:var(--text); white-space:pre-wrap;
        }

        /* ===== Editor Modal ===== */
        .editor-field { margin-bottom:16px; }
        .editor-field label {
            display:block; font-size:.78rem; font-weight:500;
            color:var(--text-secondary); margin-bottom:4px;
        }
        .editor-field input, .editor-field textarea {
            width:100%; padding:10px 14px; border-radius:4px;
            border:1px solid var(--border); background:var(--bg);
            color:var(--text); outline:none; transition:border .2s;
        }
        .editor-field input:focus, .editor-field textarea:focus { border-color:var(--text-secondary); }
        .editor-field textarea { min-height:200px; resize:vertical; }
        .editor-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
        .btn {
            padding:9px 22px; border-radius:4px; font-size:.85rem; font-weight:500;
            background:var(--accent); color:var(--bg);
            transition:opacity .2s;
        }
        .btn:hover { opacity:.85; }
        .btn-outline {
            background:transparent; color:var(--text);
            border:1px solid var(--border);
        }
        .btn-outline:hover { background:var(--bg-soft); }
        .btn-sm { padding:6px 16px; font-size:.78rem; }
        .btn-danger { background:#b91c1c; }

        /* ===== Login ===== */
        .login-form {
            max-width:320px; margin:0 auto; padding:40px 0;
        }
        .login-form h3 {
            font-family:var(--font-serif); font-size:1.2rem;
            margin-bottom:20px; text-align:center; color:var(--text);
        }
        .login-form .field {
            margin-bottom:12px;
        }
        .login-form .field input {
            width:100%; padding:10px 14px; border-radius:4px;
            border:1px solid var(--border); background:var(--bg);
            color:var(--text); outline:none;
        }
        .login-form .field input:focus { border-color:var(--text-secondary); }
        .login-error { color:#b91c1c; font-size:.8rem; margin-top:8px; text-align:center; }
        .login-status {
            font-size:.82rem; color:var(--text-secondary);
            display:flex; align-items:center; gap:8px;
        }
        .login-status .name { color:var(--text); font-weight:500; }

        /* ===== Toolbox ===== */
        .tool-group {
            margin-bottom:36px;
        }
        .tool-group h3 {
            font-family:var(--font-serif); font-size:1.05rem; font-weight:600;
            color:var(--text); margin-bottom:16px;
            padding-bottom:8px; border-bottom:1px solid var(--border);
        }
        .tool-group .hint {
            font-size:.78rem; color:var(--text-dim); margin-bottom:10px;
        }
        .tool-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
        .tool-row input {
            flex:1; min-width:160px; padding:8px 14px; border-radius:4px;
            border:1px solid var(--border); background:var(--bg);
            color:var(--text); outline:none;
        }
        .tool-row input:focus { border-color:var(--text-secondary); }

        .gh-repo-list { margin-top:12px; }
        .gh-repo-item {
            padding:10px 0; border-bottom:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:center; gap:12px;
        }
        .gh-repo-item:last-child { border:none; }
        .gh-repo-item .name { font-size:.88rem; font-weight:450; }
        .gh-repo-item .meta { font-size:.75rem; color:var(--text-dim); }

        /* ===== Email Inbox ===== */
        .email-list { margin-top:12px; }
        .email-item {
            padding:12px 14px; border:1px solid var(--border); border-radius:4px;
            margin-bottom:6px; cursor:pointer; transition:background .15s;
        }
        .email-item:hover { background:var(--bg-soft); }
        .email-item .from {
            font-size:.82rem; font-weight:500; color:var(--text);
        }
        .email-item .subj {
            font-size:.82rem; color:var(--text-secondary);
        }
        .email-item .time {
            font-size:.72rem; color:var(--text-dim);
        }
        .email-empty { font-size:.82rem; color:var(--text-dim); padding:16px 0; }
        .email-detail {
            margin-top:12px; padding:16px; border:1px solid var(--border); border-radius:4px;
            background:var(--bg-soft); display:none;
            font-size:.85rem; line-height:1.8; white-space:pre-wrap;
        }
        .email-detail.show { display:block; }

        /* ===== Music Player ===== */
        .player-wrap {
            position:fixed; bottom:28px; right:28px; z-index:800;
            display:flex; align-items:center;
            transition:transform .4s cubic-bezier(.22,1,.36,1);
        }
        .player-wrap.collapsed {
            transform:translateX(calc(100% - 42px));
        }
        .player-body {
            display:flex; align-items:center; gap:8px;
            background:var(--bg-card);
            border:1px solid var(--border);
            border-radius:6px;
            padding:8px 14px 8px 18px;
            box-shadow:var(--shadow);
            transition:opacity .3s, max-width .4s;
            max-width:400px;
        }
        .player-wrap.collapsed .player-body {
            opacity:0; pointer-events:none; max-width:0; padding:8px 0;
            overflow:hidden;
        }
        .player-info {
            display:flex; flex-direction:column; line-height:1.3;
            min-width:0; margin-right:4px;
        }
        .player-info .song {
            font-size:.78rem; font-weight:500; color:var(--text);
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
            max-width:120px;
        }
        .player-info .artist {
            font-size:.65rem; color:var(--text-dim);
        }
        .player-ctrl { display:flex; align-items:center; gap:2px; }
        .player-ctrl button {
            width:30px; height:30px; display:grid; place-items:center;
            font-size:.82rem; border-radius:4px;
            color:var(--text-secondary);
            transition:background .2s,color .2s;
        }
        .player-ctrl button:hover { background:var(--bg-soft); color:var(--text); }
        .player-progress {
            width:48px; height:2px; background:var(--border); border-radius:2px;
            overflow:hidden; cursor:pointer; flex-shrink:0;
        }
        .player-progress .bar {
            height:100%; width:0%; background:var(--accent); border-radius:2px;
            transition:width .1s linear;
        }
        .player-toggle {
            width:36px; height:36px; display:grid; place-items:center;
            font-size:.9rem; color:var(--text-secondary);
            border:1px solid var(--border); border-radius:6px;
            background:var(--bg-card);
            margin-left:-1px; flex-shrink:0;
            transition:background .2s,color .2s;
            box-shadow:var(--shadow);
        }
        .player-toggle:hover { background:var(--bg-soft); color:var(--text); }
        .player-wrap.collapsed .player-toggle { margin-left:0; }

        /* ===== Toast ===== */
        .toast-container {
            position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
            z-index:999; display:flex; flex-direction:column; align-items:center; gap:8px;
            pointer-events:none;
        }
        .toast {
            padding:10px 22px; border-radius:4px;
            background:var(--bg-card); border:1px solid var(--border);
            box-shadow:var(--shadow); font-size:.82rem; color:var(--text);
            animation:toastIn .3s ease;
            pointer-events:auto;
        }
        @keyframes toastIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

        /* ===== Footer ===== */
        .footer {
            padding:24px 0 32px;
            border-top:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:center;
            font-size:.78rem; color:var(--text-dim); flex-wrap:wrap; gap:8px;
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

        /* ===== Responsive ===== */
        @media (max-width:600px) {
            .page { padding:0 16px; }
            .header { padding:20px 0 16px; }
            .blog-title { font-size:1.1rem; letter-spacing:2px; }
            .nav a, .nav button { padding:4px 10px; font-size:.78rem; }
            .home-hero { padding:32px 0 24px; }
            .home-name { letter-spacing:4px; }
            .modal { padding:24px 20px; }
            .modal-overlay { padding:40px 12px 20px; }
            .player-wrap { bottom:16px; right:12px; }
            .player-body { padding:6px 10px 6px 14px; }
            .player-info .song { max-width:70px; font-size:.72rem; }
            .player-progress { width:32px; }
            .toast-container { bottom:70px; left:12px; right:12px; transform:none; }
        }
    
        /* ====== 时间线 ====== */
        .tl-item { display: flex; gap: 14px; margin-bottom: 0; position: relative; }
        .tl-item::before { content: ''; position: absolute; left: 5px; top: 18px; bottom: -18px; width: 1px; background: var(--border); }
        .tl-item:last-child::before { display: none; }
        .tl-first .tl-dot { background: var(--accent); box-shadow: 0 0 0 3px rgba(43,43,43,.12); }
        .tl-dot { width: 11px; height: 11px; min-width: 11px; border-radius: 50%; background: var(--border); margin-top: 6px; transition: background .3s; }
        .tl-card { flex: 1; padding: 10px 0 20px; border-bottom: 1px solid var(--border); }
        .tl-item:last-child .tl-card { border-bottom: none; }
        .tl-date { font-size: .78rem; color: var(--text-dim); margin-bottom: 4px; }
        .tl-date span { opacity: .5; margin-left: 6px; font-family: 'JetBrains Mono', monospace; }
        .tl-title { font-weight: 600; cursor: pointer; font-size: 1.05rem; transition: opacity .2s; }
        .tl-title:hover { opacity: .7; }
        .tl-excerpt { font-size: .82rem; color: var(--text-dim); margin-top: 4px; line-height: 1.5; }
        .tl-actions { margin-top: 10px; display: flex; gap: 16px; font-size: .78rem; }
        .tl-actions span { cursor: pointer; opacity: .6; transition: opacity .2s; }
        .tl-actions span:hover { opacity: 1; }
        .tl-empty { font-size: .9rem; color: var(--text-dim); padding: 20px 0; }
</style>
</head>
<body>
    <div class="page">
        <!-- ========== HEADER ========== -->
        <header class="header">
            <a href="#" class="blog-title" data-view="home">芸芣苡</a>
            <nav class="nav">
                <a href="#" data-view="home" class="active">首页</a>
                <a href="#" data-view="articles">文章</a>
                <a href="#" data-view="toolbox" id="navToolbox" style="display:none">工具箱</a>
                <a href="#" data-view="about">关于</a>
                <span class="nav-sep"></span>
                <button class="theme-btn" id="themeToggle" aria-label="切换主题">○</button>
                <button id="loginBtn">登录</button>
                <span id="loginStatus" style="display:none" class="login-status">
                    <span class="name" id="loginDisplayName"></span>
                    <button id="logoutBtn" style="font-size:.75rem;color:var(--text-dim)">退出</button>
                </span>
            </nav>
        </header>

        <!-- ========== VIEW: HOME ========== -->
        <section class="view active" id="view-home">
            <div class="home-hero">
                <div class="home-name">芸芣苡</div>
                <div class="home-quote loading" id="dailyQuote">载其见兮</div>
                <div class="home-divider"></div>
                <div class="home-sections">
                    <a href="#" data-view="articles">
                    <a href="#" data-view="timeline">
                        文章 <span class="arrow">&nbsp;→</span>
                    </a>
                    <a href="#" data-view="toolbox" id="homeToolbox" style="display:none">
                        工具箱 <span class="arrow">&nbsp;→</span>
                    </a>
                    <a href="#" data-view="about">
                        关于 <span class="arrow">&nbsp;→</span>
                    </a>
                </div>
            </div>
            <div class="home-recent">
                <div class="home-recent-label">最近更新</div>
                <div id="homeRecentList"></div>
            </div>
        </section>

        <!-- ========== VIEW: ARTICLES ========== -->
        <section class="view" id="view-articles">
            <div class="page-header">
                <h2>文章</h2>
                <div>
                    <button class="btn btn-sm" id="writeArticleBtn" style="display:none">写文章</button>
                </div>
            </div>
            <div id="articleList"></div>
        </section>
        <!-- ========== VIEW: TIMELINE ========== -->
        <section class="view" id="view-timeline">
            <div class="page-header">
                <h2>时间线</h2>
            </div>
            <div id="timelineList"></div>
        </section>


        <!-- ========== VIEW: TOOLBOX ========== -->
        <section class="view" id="view-toolbox">
            <div class="page-header">
                <h2>工具箱</h2>
            </div>

            <!-- GitHub -->
            <div class="tool-group">
                <h3>GitHub</h3>
                <div class="hint">使用 Personal Access Token 连接你的仓库</div>
                <div class="tool-row">
                    <input type="password" id="ghToken" placeholder="github_pat_..." />
                    <button class="btn btn-sm" id="ghConnectBtn">连接</button>
                </div>
                <div id="ghRepoList" class="gh-repo-list"></div>
            </div>

            <!-- 临时邮箱 -->
            <div class="tool-group">
                <h3>临时邮箱</h3>
                <div class="hint">
                    填入你的 Cloudflare Worker 部署地址即可使用
                    <br/>
                    <span style="font-size:.72rem;color:var(--text-dim)">
                        示例: https://temp-email.your-name.workers.dev
                    </span>
                </div>
                <div class="tool-row">
                    <input type="url" id="emailApiUrl" placeholder="https://your-worker.workers.dev" />
                    <button class="btn btn-sm" id="emailConnectBtn">接入</button>
                </div>
                <div id="emailSection" style="display:none">
                    <div class="tool-row" style="margin-top:10px">
                        <button class="btn btn-sm btn-outline" id="emailGenBtn">生成新地址</button>
                        <button class="btn btn-sm btn-outline" id="emailRefreshBtn">刷新收件箱</button>
                    </div>

    <div class="modal-overlay" id="loginModal">

                    <input type="text" id="loginUsername" placeholder="用户名" />

                    <input type="password" id="loginPassword" placeholder="密码" />

    <!-- ========== TOAST ========== -->

    <!-- ========== MUSIC PLAYER ========== -->
    <div class="player-wrap" id="playerWrap">
        <div class="player-body">

                <span class="song" id="songName">未播放</span>
                <span class="artist" id="artistName">-</span>

                <div class="bar" id="progressBar"></div>

                <button id="prevBtn" title="上一首">◂</button>
                <button id="playBtn" title="播放/暂停">|></button>
                <button id="nextBtn" title="下一首">▸</button>

                <button id="searchMusicBtn" title="搜索音乐" style="font-size:.72rem">⌕</button>

    </div>

    <script>
        // ================================================================
        //  CONFIG
        // ================================================================
        const ADMIN_USER = 'admin';
        const ADMIN_PASS = 'admin123';
        const QUOTES = [
            '关关雎鸠，在河之洲',
            '桃之夭夭，灼灼其华',
            '昔我往矣，杨柳依依',
            '蒹葭苍苍，白露为霜',
            '采采芣苡，薄言采之',
            '青青子衿，悠悠我心',
            '所谓伊人，在水一方',
            '知我者，谓我心忧',
            '他山之石，可以攻玉',
            '靡不有初，鲜克有终',
            '高山仰止，景行行止',
            '行到水穷处，坐看云起时',
            '晚来天欲雪，能饮一杯无',
            '人生如逆旅，我亦是行人',
            '小舟从此逝，江海寄余生',
            '且将新火试新茶，诗酒趁年华'
        ];

        // ================================================================
        //  STATE
        // ================================================================
        let currentView = 'home';
        let isLoggedIn = false;
        let articles = [];
        let editingId = null;
        let musicPlaylist = [];
        let musicIndex = 0;
        let audio = null;

        // ================================================================
        //  DOM REFS
        // ================================================================
        const $ = id => document.getElementById(id);
        const get = (sel, ctx) => (ctx||document).querySelector(sel);
        const getAll = (sel, ctx) => (ctx||document).querySelectorAll(sel);

        // ================================================================
        //  INIT
        // ================================================================
        document.addEventListener('DOMContentLoaded', async () => {
            await initDB();
            loadState();
            initTheme();
            initViews();
            initLogin();
            initArticles();
            initGitHub();
            initEmail();
            initMusic();
            initQuote();
            renderHomeRecent();
            renderArticleList();
            renderTimelineList();
            renderTimelineList();
        });

        // ====== IndexedDB 存储 ======
        let db;
        function initDB() {
            return new Promise((ok, fail) => {
                const r = indexedDB.open('yfy_blog', 2);
                r.onupgradeneeded = e => {
                    const d = e.target.result;
                    if (!d.objectStoreNames.contains('articles')) {
                        d.createObjectStore('articles', { keyPath: 'id' });
                    }
                };
                r.onsuccess = e => { db = e.target.result; ok(); };
                r.onerror = () => fail(r.error);
            });
        }
        function dbAll() {
            return new Promise((ok, fail) => {
                const tx = db.transaction('articles', 'readonly');
                const req = tx.objectStore('articles').getAll();
                req.onsuccess = () => ok(req.result || []);
                req.onerror = () => fail(req.error);
            });
        }
        function dbPut(a) {
            return new Promise((ok, fail) => {
                const tx = db.transaction('articles', 'readwrite');
                const req = tx.objectStore('articles').put(a);
                req.onsuccess = ok;
                req.onerror = () => fail(req.error);
            });
        }
        function dbDel(id) {
            return new Promise((ok, fail) => {
                const tx = db.transaction('articles', 'readwrite');
                const req = tx.objectStore('articles').delete(id);
                req.onsuccess = ok;
                req.onerror = () => fail(req.error);
            });
        }
        async function loadArticles() {
            let arr = await dbAll();
            // 迁移旧 localStorage 数据
            const old = localStorage.getItem('blog_articles');
            if (old) {
                try {
                    const oldArr = JSON.parse(old);
                    for (const a of oldArr) {
                        if (!a.id) a.id = 'a_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
                        await dbPut(a);
                    }
                    localStorage.removeItem('blog_articles');
                    arr = await dbAll();
                } catch(e) {}
            }
            articles = arr.sort((a,b) => a.ts - b.ts);
        }

        // ====== 时间线视图 ======
        function renderTimelineList() {
            const list = $('timelineList');
            if (!list) return;
            const tl = $('timelineView');
            if (!tl) return;
            tl.classList.toggle('hidden', !isLoggedIn);
            if (!isLoggedIn) return;

            if (!articles.length) {
                list.innerHTML = '<div class="tl-empty">时间线为空，写点东西吧</div>';
                return;
            }
            let html = '';
            const reversed = [...articles].reverse();
            reversed.forEach((a, i) => {
                const d = new Date(a.ts);
                const dateStr = d.getFullYear() + '-' +
                    String(d.getMonth()+1).padStart(2,'0') + '-' +
                    String(d.getDate()).padStart(2,'0');
                const timeStr = String(d.getHours()).padStart(2,'0') + ':' +
                    String(d.getMinutes()).padStart(2,'0');
                const cls = i === 0 ? ' tl-first' : '';
                html += '<div class="tl-item' + cls + '">';
                html += '<div class="tl-dot"></div>';
                html += '<div class="tl-card">';
                html += '<div class="tl-date">' + dateStr + ' <span>' + timeStr + '</span></div>';
                html += '<div class="tl-title" onclick="openArticle(\'' + a.id + '\')">' + escHtml(a.title) + '</div>';
                if (a.excerpt) html += '<div class="tl-excerpt">' + escHtml(a.excerpt.slice(0, 120)) + '</div>';
                if (isLoggedIn) {
                    html += '<div class="tl-actions">';
                    html += '<span onclick="openTimelineEditor(\'' + a.id + '\')">编辑</span>';
                    html += '<span onclick="delTimelineArticle(\'' + a.id + '\')">删除</span>';
                    html += '</div>';
                }
                html += '</div></div>';
            });
            list.innerHTML = html;
        }

        async function delTimelineArticle(id) {
            if (!confirm('删除这篇文章？')) return;
            await dbDel(id);
            await loadArticles();
            renderTimelineList();
            renderArticleList();
            renderTimelineList();
            renderHomeRecent();
            toast('已删除');
        }

        function openTimelineEditor(id) {
            const a = articles.find(x => x.id === id);
            if (!a) return;
            editorIdx = articles.indexOf(a);
            $('editorTitle').value = a.title || '';
            $('editorCat').value = a.cat || '';
            $('editorText').value = a.content || '';
            $('editorModal').classList.add('open');
        }

        function loadState() {
            const savedLogin = localStorage.getItem('blog_login');
            if (savedLogin === 'true') setLoggedIn(true);
        }

        function saveState() {} // deprecated, now using IndexedDB

        // ================================================================
        //  THEME
        // ================================================================
        function initTheme() {
            const saved = localStorage.getItem('blog_theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
            $('themeToggle').textContent = saved === 'dark' ? '◎' : '○';
            $('themeToggle').addEventListener('click', () => {
                const cur = document.documentElement.getAttribute('data-theme');
                const next = cur === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('blog_theme', next);
                $('themeToggle').textContent = next === 'dark' ? '◎' : '○';
            });
        }

        // ================================================================
        //  VIEWS
        // ================================================================
        function initViews() {
            getAll('[data-view]').forEach(el => {
                el.addEventListener('click', e => {
                    e.preventDefault();
                    const v = el.dataset.view;
                    if (v === 'toolbox' && !isLoggedIn) return;
                    switchView(v);
                });
            });
        }

        function switchView(name) {
            if (name === 'toolbox' && !isLoggedIn) return;
            currentView = name;
            getAll('.view').forEach(v => v.classList.remove('active'));
            const target = $('view-' + name);
            if (target) target.classList.add('active');
            getAll('[data-view]').forEach(a => a.classList.remove('active'));
            const navLink = document.querySelector(`[data-view="${name}"]`);
            if (navLink) navLink.classList.add('active');
            window.scrollTo({top:0,behavior:'smooth'});
        }

        // ================================================================
        //  LOGIN
        // ================================================================
        function initLogin() {
            // Check saved login
            const saved = localStorage.getItem('blog_login');
            if (saved === 'true') {
                setLoggedIn(true);
            }

            $('loginBtn').addEventListener('click', () => {
                if (isLoggedIn) return;
                $('loginModal').classList.add('open');
                $('loginUsername').value = '';
                $('loginPassword').value = '';
                $('loginError').textContent = '';
                $('loginUsername').focus();
            });

            $('loginModalClose').addEventListener('click', () => {
                $('loginModal').classList.remove('open');
            });
            $('loginModal').addEventListener('click', e => {
                if (e.target === $('loginModal')) $('loginModal').classList.remove('open');
            });

            $('loginSubmitBtn').addEventListener('click', () => {
                const u = $('loginUsername').value.trim();
                const p = $('loginPassword').value.trim();
                if (u === ADMIN_USER && p === ADMIN_PASS) {
                    $('loginModal').classList.remove('open');
                    setLoggedIn(true);
                    localStorage.setItem('blog_login', 'true');
                    toast('登录成功', '');
                } else {
                    $('loginError').textContent = '用户名或密码错误';
                }
            });

            $('loginUsername').addEventListener('keydown', e => {
                if (e.key === 'Enter') $('loginPassword').focus();
            });
            $('loginPassword').addEventListener('keydown', e => {
                if (e.key === 'Enter') $('loginSubmitBtn').click();
            });

            $('logoutBtn').addEventListener('click', () => {
                setLoggedIn(false);
                localStorage.removeItem('blog_login');
                
                toast('已退出');
                switchView('home');
            });
        }

        function setLoggedIn(val) {
            isLoggedIn = val;
            if (val) {
                $('loginBtn').style.display = 'none';
                
                $('loginStatus').style.display = 'flex';
                $('loginDisplayName').textContent = ADMIN_USER;
                $('navToolbox').style.display = 'inline-block';
                $('homeToolbox').style.display = 'flex';
                $('writeArticleBtn').style.display = 'inline-block';
            } else {
                $('loginBtn').style.display = 'inline-block';
                $('loginStatus').style.display = 'none';
                $('navToolbox').style.display = 'none';
                $('homeToolbox').style.display = 'none';
                $('writeArticleBtn').style.display = 'none';
                // if on toolbox view, go home
                if (currentView === 'toolbox') switchView('home');
            }
            renderArticleList();
            renderTimelineList();
            renderHomeRecent();
        }

        // ================================================================
        //  QUOTE
        // ================================================================
        function initQuote() {
            const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
            $('dailyQuote').textContent = '“' + q + '”';
            $('dailyQuote').classList.remove('loading');
        }

        // ================================================================
        //  ARTICLES
        // ================================================================
        function initArticles() {
            // Write button
            $('writeArticleBtn').addEventListener('click', () => openEditor());

            // Editor modal
            $('editorClose').addEventListener('click', closeEditor);
            $('editorCancel').addEventListener('click', closeEditor);
            $('editorModal').addEventListener('click', e => {
                if (e.target === $('editorModal')) closeEditor();
            });
            $('editorSave').addEventListener('click', saveArticle);

            // Article detail modal
            $('modalClose').addEventListener('click', () => $('articleModal').classList.remove('open'));
            $('articleModal').addEventListener('click', e => {
                if (e.target === $('articleModal')) $('articleModal').classList.remove('open');
            });
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') {
                    $('articleModal').classList.remove('open');
                    closeEditor();
                }
            });
            // Ctrl+Enter to save
            $('editContent').addEventListener('keydown', e => {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    saveArticle();
                }
            });
        }

        function renderArticleList() {
            const list = $('articleList');
            if (!articles.length) {
                list.innerHTML = '<div class="empty-state">还没有文章</div>';
                return;
            }
            let html = '';
            articles.slice().reverse().forEach((a, idx) => {
                const realIdx = articles.length - 1 - idx;
                const excerpt = a.content.length > 80 ? a.content.slice(0,80) + '…' : a.content;
                html += '<div class="article-item">' +
                    '<div class="art-title clickable" data-idx="' + realIdx + '">' + escHtml(a.title) + '</div>' +
                    '<div class="art-meta">' +
                    (a.tag ? '<span class="tag">' + escHtml(a.tag) + '</span>' : '') +
                    '<span>' + a.date + '</span>' +
                    '<span>' + Math.max(1, Math.ceil(a.content.length / 400)) + ' min read</span>' +
                    '</div>';
                if (isLoggedIn) {
                    html += '<div class="art-actions">' +
                        '<button class="edit-btn" data-idx="' + realIdx + '">编辑</button>' +
                        '<button class="del-btn" data-idx="' + realIdx + '">删除</button>' +
                        '</div>';
                }
                html += '</div>';
            });
            list.innerHTML = html;

            // Click title to read
            list.querySelectorAll('.art-title.clickable').forEach(el => {
                el.addEventListener('click', () => {
                    const idx = parseInt(el.dataset.idx);
                    openArticle(idx);
                });
            });

            // Edit/Delete
            if (isLoggedIn) {
                list.querySelectorAll('.edit-btn').forEach(el => {
                    el.addEventListener('click', e => {
                        e.stopPropagation();
                        const idx = parseInt(el.dataset.idx);
                        openEditor(idx);
                    });
                });
                list.querySelectorAll('.del-btn').forEach(el => {
                    el.addEventListener('click', e => {
                        e.stopPropagation();
                        const idx = parseInt(el.dataset.idx);
                        if (confirm('确定删除「' + articles[idx].title + '」？')) {
                            articles.splice(idx, 1);
                            saveState();
                            renderArticleList();
            renderTimelineList();
                            renderHomeRecent();
                            toast('已删除');
                        }
                    });
                });
            }
        }

        function renderHomeRecent() {
            const list = $('homeRecentList');
            if (!articles.length) {
                list.innerHTML = '<div class="home-recent-empty">还没有文章</div>';
                return;
            }
            const recent = articles.slice(-3).reverse();
            let html = '';
            recent.forEach(a => {
                html += '<div class="home-recent-item">' +
                    '<span class="title">' + escHtml(a.title) + '</span>' +
                    '<span class="date">' + a.date + '</span>' +
                    '</div>';
            });
            list.innerHTML = html;
        }

        function openArticle(idx) {
            const a = articles[idx];
            if (!a) return;
            $('modalTitle').textContent = a.title;
            $('modalMeta').textContent = (a.tag ? a.tag + ' · ' : '') + a.date + ' · ' + Math.max(1, Math.ceil(a.content.length / 400)) + ' min read';
            $('modalContent').textContent = a.content;
            $('articleModal').classList.add('open');
        }

        function openEditor(idx) {
            editingId = (idx !== undefined && idx !== null) ? idx : null;
            if (editingId !== null) {
                const a = articles[editingId];
                $('editorTitle').textContent = '编辑文章';
                $('editTitle').value = a.title;
                $('editTag').value = a.tag || '';
                $('editContent').value = a.content;
            } else {
                $('editorTitle').textContent = '写文章';
                $('editTitle').value = '';
                $('editTag').value = '';
                $('editContent').value = '';
            }
            $('editorModal').classList.add('open');
            setTimeout(() => $('editTitle').focus(), 100);
        }

        function closeEditor() {
            $('editorModal').classList.remove('open');
            editingId = null;
        }

        function saveArticle() {
            const title = $('editTitle').value.trim();
            const content = $('editContent').value.trim();
            if (!title) { toast('请输入标题', 'e'); return; }
            if (!content) { toast('请输入正文', 'e'); return; }
            const tag = $('editTag').value.trim();
            const now = new Date();
            const dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');

            if (editingId !== null) {
                articles[editingId].title = title;
                articles[editingId].content = content;
                articles[editingId].tag = tag;
                articles[editingId].date = articles[editingId].date || dateStr;
            } else {
                articles.push({ title, content, tag, date: dateStr });
            }
            saveState();
            closeEditor();
            renderArticleList();
            renderTimelineList();
            renderHomeRecent();
            toast(editingId !== null ? '已更新' : '已发布');
        }

        // ================================================================
        //  GITHUB
        // ================================================================
        function initGitHub() {
            const savedToken = localStorage.getItem('blog_gh_token');
            if (savedToken) {
                $('ghToken').value = savedToken;
                fetchRepos(savedToken);
            }
            $('ghConnectBtn').addEventListener('click', () => {
                const token = $('ghToken').value.trim();
                if (!token) { toast('请输入 Token', 'e'); return; }
                localStorage.setItem('blog_gh_token', token);
                fetchRepos(token);
            });
        }

        async function fetchRepos(token) {
            $('ghRepoList').innerHTML = '<div style="font-size:.82rem;color:var(--text-dim);padding:8px 0">连接中...</div>';
            try {
                const res = await fetch('https://api.github.com/user/repos?sort=updated&per_page=20', {
                    headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (!res.ok) {
                    const err = await res.json().catch(()=>{});
                    $('ghRepoList').innerHTML = '<div style="font-size:.82rem;color:#b91c1c">错误: ' + (err?.message || res.status) + '</div>';
                    return;
                }
                const repos = await res.json();
                if (!repos.length) {
                    $('ghRepoList').innerHTML = '<div style="font-size:.82rem;color:var(--text-dim)">没有仓库</div>';
                    return;
                }
                let html = '';
                repos.slice(0,15).forEach(r => {
                    html += '<div class="gh-repo-item">' +
                        '<div class="name">' + escHtml(r.name) + '</div>' +
                        '<div class="meta">' +
                        (r.language ? r.language + ' · ' : '') +
                        '★' + (r.stargazers_count || 0) +
                        '</div>' +
                        '</div>';
                });
                $('ghRepoList').innerHTML = html;
                toast('已加载 ' + repos.length + ' 个仓库');
            } catch(e) {
                $('ghRepoList').innerHTML = '<div style="font-size:.82rem;color:#b91c1c">连接失败: ' + e.message + '</div>';
            }
        }

        // ================================================================
        //  TEMP EMAIL (Cloudflare Worker)
        // ================================================================
        let emailWorkerUrl = '';
        let currentEmail = '';

        function initEmail() {
            $('emailConnectBtn').addEventListener('click', () => {
                const url = $('emailApiUrl').value.trim().replace(/\/+$/, '');
                if (!url) { toast('请输入 Worker 地址', 'e'); return; }
                emailWorkerUrl = url;
                localStorage.setItem('blog_email_url', url);
                $('emailSection').style.display = 'block';
                toast('已接入');
                // Try to generate or fetch existing
                fetchInbox();
            });

            const savedUrl = localStorage.getItem('blog_email_url');
            if (savedUrl) {
                $('emailApiUrl').value = savedUrl;
                emailWorkerUrl = savedUrl;
                $('emailSection').style.display = 'block';
                fetchInbox();
            }

            $('emailGenBtn').addEventListener('click', generateEmail);
            $('emailRefreshBtn').addEventListener('click', fetchInbox);
        }

        async function generateEmail() {
            if (!emailWorkerUrl) { toast('请先接入 Worker', 'e'); return; }
            try {
                const res = await fetch(emailWorkerUrl + '/api/email', { method:'POST' });
                const data = await res.json();
                const addr = data.address || data.email || data.data?.address || (typeof data === 'string' ? data : JSON.stringify(data));
                currentEmail = addr;
                $('emailAddress').textContent = addr;
                toast('已生成: ' + addr);
                fetchInbox();
            } catch(e) {
                toast('生成失败: ' + e.message, 'e');
            }
        }

        async function fetchInbox() {
            if (!emailWorkerUrl) return;
            const list = $('emailInbox');
            const detail = $('emailDetail');
            detail.classList.remove('show');
            // 先获取地址
            try {
                const ar = await fetch(emailWorkerUrl + '/api/address');
                const ad = await ar.json();
                const addr = ad.address || ad;
                if (addr) {
                    currentEmail = addr;
                    $('emailAddress').textContent = addr;
                }
            } catch(e) {}
            detail.textContent = '';
            list.innerHTML = '<div style="font-size:.82rem;color:var(--text-dim);padding:8px 0">加载中...</div>';
            try {
                const res = await fetch(emailWorkerUrl + '/api/emails');
                const data = await res.json();
                const emails = data.emails || data.data || data.messages || [];
                if (!emails.length) {
                    list.innerHTML = '<div class="email-empty">暂无邮件</div>';
                    return;
                }
                let html = '';
                emails.slice(0,20).forEach((m, i) => {
                    const from = m.from || m.sender || m.from_address || '(未知)';
                    const subj = m.subject || m.subject || '(无主题)';
                    const time = m.date || m.time || m.created_at || '';
                    html += '<div class="email-item" data-idx="' + i + '" data-msg=\'' + JSON.stringify(m).replace(/'/g,"&#39;") + '\'>' +
                        '<div class="from">' + escHtml(from) + '</div>' +
                        '<div class="subj">' + escHtml(subj) + '</div>' +
                        '<div class="time">' + escHtml(time) + '</div>' +
                        '</div>';
                });
                list.innerHTML = html;
                list.querySelectorAll('.email-item').forEach(el => {
                    el.addEventListener('click', () => {
                        try {
                            const msg = JSON.parse(el.dataset.msg);
                            showEmailDetail(msg);
                        } catch(e) {}
                    });
                });
                toast('收件箱已刷新');
            } catch(e) {
                list.innerHTML = '<div style="font-size:.82rem;color:#b91c1c">获取失败: ' + e.message + '</div>';
            }
        }

        function showEmailDetail(msg) {
            const detail = $('emailDetail');
            const content = msg.text || msg.html || msg.content || msg.body || '(无内容)';
            const from = msg.from || msg.sender || msg.from_address || '';
            const subj = msg.subject || msg.subject || '(无主题)';
            detail.innerHTML = '<div style="margin-bottom:10px;font-weight:500">' + escHtml(from) + ' — ' + escHtml(subj) + '</div>' +
                '<div>' + escHtml(content) + '</div>';
            detail.classList.add('show');
        }

        // ================================================================
        //  MUSIC PLAYER
        // ================================================================
        const MUSIC_SORTS = ['热歌榜','新歌榜','飙升榜','抖音榜','电音榜'];

        function initMusic() {
            audio = new Audio();
            audio.volume = 0.6;

            // Load playlist
            loadMusicPlaylist();

            // Controls
            $('playBtn').addEventListener('click', togglePlay);
            $('nextBtn').addEventListener('click', () => playIndex(musicIndex + 1));
            $('prevBtn').addEventListener('click', () => playIndex(musicIndex - 1));

            // Progress bar
            audio.addEventListener('timeupdate', () => {
                if (audio.duration) {
                    const pct = (audio.currentTime / audio.duration) * 100;
                    $('progressBar').style.width = pct + '%';
                }
            });
            audio.addEventListener('ended', () => playIndex(musicIndex + 1));

            $('playerProgress').addEventListener('click', e => {
                const rect = e.currentTarget.getBoundingClientRect();
                const pct = (e.clientX - rect.left) / rect.width;
                if (audio.duration) {
                    audio.currentTime = pct * audio.duration;
                }
            });

            // Toggle collapse
            $('playerToggle').addEventListener('click', () => {
                $('playerWrap').classList.toggle('collapsed');
                $('playerToggle').textContent = $('playerWrap').classList.contains('collapsed') ? '>' : '<';
            });

            // Search
            $('searchMusicBtn').addEventListener('click', musicSearch);
        }

        async function loadMusicPlaylist() {
            const songs = [];
            for (const sort of MUSIC_SORTS) {
                try {
                    const res = await fetch('https://api.uomg.com/api/rand.music?sort=' + encodeURIComponent(sort) + '&format=json');
                    const data = await res.json();
                    if (data.code === 1 && data.data && data.data.url) {
                        songs.push({
                            name: data.data.name || '未知歌曲',
                            artist: data.data.artistsname || data.data.singername || '未知歌手',
                            url: data.data.url,
                            pic: data.data.pic || ''
                        });
                    }
                } catch(e) {}
            }
            if (songs.length > 0) {
                musicPlaylist = songs;
                playIndex(0);
            } else {
                // Fallback - use some built-in free music URLs
                musicPlaylist = [
                    { name:'起风了', artist:'买辣椒也用券', url:'https://music.163.com/song/media/outer/url?id=1330348068.mp3' },
                    { name:'光年之外', artist:'G.E.M.邓紫棋', url:'https://music.163.com/song/media/outer/url?id=474436604.mp3' },
                ];
                playIndex(0);
            }
        }

        function playIndex(idx) {
            if (!musicPlaylist.length) return;
            if (idx < 0) idx = musicPlaylist.length - 1;
            if (idx >= musicPlaylist.length) idx = 0;
            musicIndex = idx;
            const song = musicPlaylist[idx];
            $('songName').textContent = song.name;
            $('artistName').textContent = song.artist;
            $('playBtn').textContent = '...';
            try {
                audio.src = song.url;
                audio.play().then(() => {
                    $('playBtn').textContent = '||'; // pause
                }).catch(() => {
                    $('playBtn').textContent = '...';
                });
            } catch(e) {
                $('playBtn').textContent = '...';
            }
        }

        function togglePlay() {
            if (!audio.src) { playIndex(musicIndex); return; }
            if (audio.paused) {
                audio.play().then(() => $('playBtn').textContent = '⏸').catch(()=>{});
            } else {
                audio.pause();
                $('playBtn').textContent = '...';
            }
        }

        // Music search using uomg API
        async function musicSearch() {
            const keyword = prompt('搜索歌曲：');
            if (!keyword || !keyword.trim()) return;
            try {
                const res = await fetch('https://api.uomg.com/api/music.search?keyword=' + encodeURIComponent(keyword.trim()) + '&format=json');
                const data = await res.json();
                if (data.code === 1 && data.data && data.data.length) {
                    const results = data.data.slice(0,10);
                    // Show as selectable list
                    let msg = '搜索结果：\n';
                    results.forEach((s, i) => {
                        msg += (i+1) + '. ' + (s.name||s.title) + ' - ' + (s.artistsname||s.singername||s.author||'') + '\n';
                    });
                    msg += '\n输入序号播放 (1-' + results.length + ')，或取消';
                    const choice = prompt(msg);
                    const idx = parseInt(choice) - 1;
                    if (idx >= 0 && idx < results.length) {
                        const s = results[idx];
                        const url = s.url;
                        if (url) {
                            musicPlaylist = [{ name:s.name||s.title, artist:s.artistsname||s.singername||'', url }];
                            playIndex(0);
                        } else {
                            toast('无法获取播放链接', 'e');
                        }
                    }
                } else {
                    toast('未找到结果', 'e');
                }
            } catch(e) {
                toast('搜索失败: ' + e.message, 'e');
            }
        }

        // ================================================================
        //  TOAST
        // ================================================================
        function toast(msg, type) {
            const c = $('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast';
            if (type === 'e') t.style.color = '#b91c1c';
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => {
                t.style.opacity = '0';
                t.style.transition = 'opacity .3s';
                setTimeout(() => t.remove(), 300);
            }, 2200);
        }

        // ================================================================
        //  UTILITY
        // ================================================================
        function escHtml(s) {
            if (!s) return '';
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // ================================================================
        //  KEYBOARD SHORTCUTS
        // ================================================================
        document.addEventListener('keydown', e => {
            // Space to toggle music (when not in input)
            if (e.key === ' ' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault();
                if (currentView !== 'home' && currentView !== 'articles') return;
                togglePlay();
            }
        });

        console.log('芸芣苡 · 博客 loaded');
    </script>
</body>
</html>
