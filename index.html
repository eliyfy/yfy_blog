<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>芸芣苡</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:opsz@14..32&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljsLight" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljsDark" disabled />
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; -webkit-text-size-adjust:100%; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            transition: background .35s, color .35s;
            -webkit-font-smoothing: antialiased;
        }
        a { color:inherit; text-decoration:none; }
        button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; font-size:inherit; }
        input, textarea { font-family:inherit; font-size:inherit; }
        ::selection { background:var(--accent); color:var(--bg); }

        /* ===== Theme ===== */
        :root {
            --bg: #f6f2ec;
            --bg-card: #fefcf8;
            --bg-soft: #ede8e1;
            --text: #2c2416;
            --text-secondary: #8c7a6b;
            --text-dim: #b5a698;
            --border: #dcd3c9;
            --accent: #4a3728;
            --accent-hover: #2c2416;
            --shadow: 0 1px 4px rgba(0,0,0,.04);
            --font-serif: 'Noto Serif SC', 'Georgia', serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        [data-theme="dark"] {
            --bg: #181510;
            --bg-card: #221e18;
            --bg-soft: #2a251e;
            --text: #d9d0c4;
            --text-secondary: #8c7a6b;
            --text-dim: #5a4e42;
            --border: #332c24;
            --accent: #d9d0c4;
            --accent-hover: #f0e6d8;
            --shadow: 0 1px 6px rgba(0,0,0,.3);
        }

        /* ===== Layout ===== */
        .page { max-width:720px; margin:0 auto; padding:0 24px; min-height:100vh; display:flex; flex-direction:column; }

        /* ===== Header ===== */
        .header {
            padding:32px 0 20px;
            display:flex; align-items:baseline; justify-content:space-between;
            border-bottom:1px solid var(--border);
            flex-wrap:wrap; gap:12px;
        }
        .blog-title {
            font-family:var(--font-serif);
            font-size:1.3rem; font-weight:700;
            letter-spacing:4px;
            color:var(--text);
        }
        .blog-title:hover { opacity:.7; }
        .nav { display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
        .nav a, .nav button {
            padding:6px 14px; border-radius:4px;
            font-size:.82rem; font-weight:450;
            color:var(--text-secondary);
            transition:background .2s, color .2s;
        }
        .nav a:hover, .nav button:hover { background:var(--bg-soft); color:var(--text); }
        .nav .active { color:var(--text); background:var(--bg-soft); }
        .nav-sep { width:1px; height:16px; background:var(--border); margin:0 4px; }
        .theme-btn { font-size:.85rem; padding:6px 10px; }

        /* ===== Views ===== */
        .view { display:none; padding:48px 0 60px; flex:1; }
        .view.active { display:block; animation:fadeIn .3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        /* ===== Home ===== */
        .home-hero { padding:60px 0 48px; text-align:center; }
        .home-name {
            font-family:var(--font-serif);
            font-size:clamp(2.4rem,6vw,3.6rem);
            font-weight:700; letter-spacing:8px;
            color:var(--text); line-height:1.3;
        }
        .home-quote {
            margin-top:20px;
            font-family:var(--font-serif);
            font-size:1rem; font-weight:400;
            color:var(--text-secondary);
            min-height:1.6em;
            transition:opacity .4s;
        }
        .home-quote.loading { opacity:.3; }
        .home-divider {
            width:40px; height:1px; background:var(--border);
            margin:36px auto;
        }
        .home-sections {
            display:flex; flex-direction:column; gap:2px;
            max-width:320px; margin:0 auto;
        }
        .home-sections a {
            display:flex; align-items:center; justify-content:space-between;
            padding:14px 0;
            font-size:.95rem; font-weight:450;
            color:var(--text);
            border-bottom:1px solid var(--border);
            transition:opacity .2s;
        }
        .home-sections a:last-child { border-bottom:none; }
        .home-sections a:hover { opacity:.6; }
        .home-sections .arrow { color:var(--text-dim); font-family:var(--font-serif); font-size:.8rem; }

        .home-recent { margin-top:48px; }
        .home-recent-label {
            font-size:.75rem; font-weight:500;
            color:var(--text-dim); letter-spacing:2px; text-transform:uppercase;
            margin-bottom:12px;
        }
        .home-recent-item {
            padding:16px 0; border-bottom:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:baseline; gap:16px;
        }
        .home-recent-item:last-child { border:none; }
        .home-recent-item .title { font-size:.95rem; font-weight:450; color:var(--text); }
        .home-recent-item .date { font-size:.78rem; color:var(--text-dim); white-space:nowrap; }
        .home-recent-empty {
            font-size:.85rem; color:var(--text-dim);
            padding:12px 0;
        }

        /* ===== Articles ===== */
        .page-header {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:32px; flex-wrap:wrap; gap:12px;
        }
        .page-header h2 {
            font-family:var(--font-serif);
            font-size:1.5rem; font-weight:600;
            color:var(--text);
        }
        .article-item {
            padding:20px 0; border-bottom:1px solid var(--border);
            cursor:default;
        }
        .article-item:last-child { border:none; }
        .article-item .art-title {
            font-size:1.05rem; font-weight:550;
            color:var(--text); line-height:1.4;
            margin-bottom:6px;
        }
        .article-item .art-title.clickable { cursor:pointer; }
        .article-item .art-title.clickable:hover { opacity:.7; }
        .article-item .art-meta {
            font-size:.78rem; color:var(--text-dim);
            display:flex; gap:16px; align-items:center;
        }
        .article-item .art-meta .tag {
            font-size:.7rem; padding:1px 10px;
            border:1px solid var(--border); border-radius:3px;
            color:var(--text-secondary);
        }
        .article-item .art-actions { display:flex; gap:8px; margin-top:8px; }
        .article-item .art-actions button {
            font-size:.75rem; padding:4px 12px; border-radius:3px;
            border:1px solid var(--border); color:var(--text-secondary);
            transition:background .2s;
        }
        .article-item .art-actions button:hover { background:var(--bg-soft); color:var(--text); }
        .article-item .art-actions .del-btn:hover { color:#b91c1c; border-color:#b91c1c; }
        .empty-state {
            text-align:center; padding:60px 0;
            color:var(--text-dim); font-size:.9rem;
        }

        /* ===== Article Detail Modal ===== */
        .modal-overlay {
            display:none; position:fixed; inset:0; z-index:900;
            background:rgba(0,0,0,.3); backdrop-filter:blur(4px);
            align-items:flex-start; justify-content:center;
            padding:60px 24px 40px; overflow-y:auto;
        }
        .modal-overlay.open { display:flex; }
        .modal {
            background:var(--bg-card); border:1px solid var(--border);
            max-width:640px; width:100%; padding:40px;
            border-radius:4px; position:relative;
            animation:fadeIn .25s ease;
            margin-bottom:40px;
        }
        .modal-close {
            position:absolute; top:16px; right:16px;
            width:32px; height:32px; display:grid; place-items:center;
            font-size:1.2rem; color:var(--text-dim);
            border-radius:50%; transition:background .2s;
        }
        .modal-close:hover { background:var(--bg-soft); }
        .modal h2 {
            font-family:var(--font-serif); font-size:1.4rem; font-weight:600;
            margin-bottom:6px; color:var(--text);
        }
        .modal .art-meta {
            font-size:.8rem; color:var(--text-dim); margin-bottom:20px;
        }
        .modal .art-content {
            font-size:.95rem; line-height:1.9;
            color:var(--text); white-space:pre-wrap;
        }

        /* ===== Editor Modal ===== */
        .editor-field { margin-bottom:16px; }
        .editor-field label {
            display:block; font-size:.78rem; font-weight:500;
            color:var(--text-secondary); margin-bottom:4px;
        }
        .editor-field input, .editor-field textarea {
            width:100%; padding:10px 14px; border-radius:4px;
            border:1px solid var(--border); background:var(--bg);
            color:var(--text); outline:none; transition:border .2s;
        }
        .editor-field input:focus, .editor-field textarea:focus { border-color:var(--text-secondary); }
        .editor-field textarea { min-height:200px; resize:vertical; }
        .editor-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
        .btn {
            padding:9px 22px; border-radius:4px; font-size:.85rem; font-weight:500;
            background:var(--accent); color:var(--bg);
            transition:opacity .2s;
        }
        .btn:hover { opacity:.85; }
        .btn-outline {
            background:transparent; color:var(--text);
            border:1px solid var(--border);
        }
        .btn-outline:hover { background:var(--bg-soft); }
        .btn-sm { padding:6px 16px; font-size:.78rem; }
        .btn-danger { background:#b91c1c; }

        /* ===== Login ===== */
        .login-form {
            max-width:320px; margin:0 auto; padding:40px 0;
        }
        .login-form h3 {
            font-family:var(--font-serif); font-size:1.2rem;
            margin-bottom:20px; text-align:center; color:var(--text);
        }
        .login-form .field {
            margin-bottom:12px;
        }
        .login-form .field input {
            width:100%; padding:10px 14px; border-radius:4px;
            border:1px solid var(--border); background:var(--bg);
            color:var(--text); outline:none;
        }
        .login-form .field input:focus { border-color:var(--text-secondary); }
        .login-error { color:#b91c1c; font-size:.8rem; margin-top:8px; text-align:center; }
        .login-status {
            font-size:.82rem; color:var(--text-secondary);
            display:flex; align-items:center; gap:8px;
        }
        .login-status .name { color:var(--text); font-weight:500; }

        /* ===== Toolbox ===== */
        .tool-group {
            margin-bottom:36px;
        }
        .tool-group h3 {
            font-family:var(--font-serif); font-size:1.05rem; font-weight:600;
            color:var(--text); margin-bottom:16px;
            padding-bottom:8px; border-bottom:1px solid var(--border);
        }
        .tool-group .hint {
            font-size:.78rem; color:var(--text-dim); margin-bottom:10px;
        }
        .tool-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
        .tool-row input {
            flex:1; min-width:160px; padding:8px 14px; border-radius:4px;
            border:1px solid var(--border); background:var(--bg);
            color:var(--text); outline:none;
        }
        .tool-row input:focus { border-color:var(--text-secondary); }

        .gh-repo-list { margin-top:12px; }
        .gh-repo-item {
            padding:10px 0; border-bottom:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:center; gap:12px;
        }
        .gh-repo-item:last-child { border:none; }
        .gh-repo-item .name { font-size:.88rem; font-weight:450; }
        .gh-repo-item .meta { font-size:.75rem; color:var(--text-dim); }

        /* ===== Music Player ===== */
        .player-wrap {
            position:fixed; bottom:28px; right:28px; z-index:800;
            display:flex; align-items:center;
            transition:transform .4s cubic-bezier(.22,1,.36,1);
        }
        .player-wrap.collapsed {
            transform:translateX(calc(100% - 42px));
        }
        .player-body {
            display:flex; align-items:center; gap:8px;
            background:var(--bg-card);
            border:1px solid var(--border);
            border-radius:6px;
            padding:8px 14px 8px 18px;
            box-shadow:var(--shadow);
            transition:opacity .3s, max-width .4s;
            max-width:400px;
        }
        .player-wrap.collapsed .player-body {
            opacity:0; pointer-events:none; max-width:0; padding:8px 0;
            overflow:hidden;
        }
        .player-info {
            display:flex; flex-direction:column; line-height:1.3;
            min-width:0; margin-right:4px;
        }
        .player-info .song {
            font-size:.78rem; font-weight:500; color:var(--text);
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
            max-width:120px;
        }
        .player-info .artist {
            font-size:.65rem; color:var(--text-dim);
        }
        .player-ctrl { display:flex; align-items:center; gap:2px; }
        .player-ctrl button {
            width:30px; height:30px; display:grid; place-items:center;
            font-size:.82rem; border-radius:4px;
            color:var(--text-secondary);
            transition:background .2s,color .2s;
        }
        .player-ctrl button:hover { background:var(--bg-soft); color:var(--text); }
        .player-progress {
            width:48px; height:2px; background:var(--border); border-radius:2px;
            overflow:hidden; cursor:pointer; flex-shrink:0;
        }
        .player-progress .bar {
            height:100%; width:0%; background:var(--accent); border-radius:2px;
            transition:width .1s linear;
        }
        .player-toggle {
            width:36px; height:36px; display:grid; place-items:center;
            font-size:.9rem; color:var(--text-secondary);
            border:1px solid var(--border); border-radius:6px;
            background:var(--bg-card);
            margin-left:-1px; flex-shrink:0;
            transition:background .2s,color .2s;
            box-shadow:var(--shadow);
        }
        .player-toggle:hover { background:var(--bg-soft); color:var(--text); }
        .player-wrap.collapsed .player-toggle { margin-left:0; }

        /* ===== Toast ===== */
        .toast-container {
            position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
            z-index:999; display:flex; flex-direction:column; align-items:center; gap:8px;
            pointer-events:none;
        }
        .toast {
            padding:10px 22px; border-radius:4px;
            background:var(--bg-card); border:1px solid var(--border);
            box-shadow:var(--shadow); font-size:.82rem; color:var(--text);
            animation:toastIn .3s ease;
            pointer-events:auto;
        }
        @keyframes toastIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

        /* ===== Footer ===== */
        .footer {
            padding:24px 0 32px;
            border-top:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:center;
            font-size:.78rem; color:var(--text-dim); flex-wrap:wrap; gap:8px;
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

        /* ===== Responsive ===== */
        @media (max-width:600px) {
            .page { padding:0 16px; }
            .header { padding:20px 0 16px; }
            .blog-title { font-size:1.1rem; letter-spacing:2px; }
            .nav a, .nav button { padding:4px 10px; font-size:.78rem; }
            .home-hero { padding:32px 0 24px; }
            .home-name { letter-spacing:4px; }
            .modal { padding:24px 20px; }
            .modal-overlay { padding:40px 12px 20px; }
            .player-wrap { bottom:16px; right:12px; }
            .player-body { padding:6px 10px 6px 14px; }
            .player-info .song { max-width:70px; font-size:.72rem; }
            .player-progress { width:32px; }
            .toast-container { bottom:70px; left:12px; right:12px; transform:none; }
        }
    
        /* ====== 时间线 ====== */
        .tl-item { display: flex; gap: 14px; margin-bottom: 0; position: relative; }
        .tl-item::before { content: ''; position: absolute; left: 5px; top: 18px; bottom: -18px; width: 1px; background: var(--border); }
        .tl-item:last-child::before { display: none; }
        .tl-first .tl-dot { background: var(--accent); box-shadow: 0 0 0 3px rgba(43,43,43,.12); }
        .tl-dot { width: 11px; height: 11px; min-width: 11px; border-radius: 50%; background: var(--border); margin-top: 6px; transition: background .3s; }
        .tl-card { flex: 1; padding: 10px 0 20px; border-bottom: 1px solid var(--border); }
        .tl-item:last-child .tl-card { border-bottom: none; }
        .tl-date { font-size: .78rem; color: var(--text-dim); margin-bottom: 4px; }
        .tl-date span { opacity: .5; margin-left: 6px; font-family: 'JetBrains Mono', monospace; }
        .tl-title { font-weight: 600; cursor: pointer; font-size: 1.05rem; transition: opacity .2s; }
        .tl-title:hover { opacity: .7; }
        .tl-excerpt { font-size: .82rem; color: var(--text-dim); margin-top: 4px; line-height: 1.5; }
        .tl-actions { margin-top: 10px; display: flex; gap: 16px; font-size: .78rem; }
        .tl-actions span { cursor: pointer; opacity: .6; transition: opacity .2s; }
        .tl-actions span:hover { opacity: 1; }
        .tl-empty { font-size: .9rem; color: var(--text-dim); padding: 20px 0; }

        /* ================================================================ */
        /*  方案一：阅读进度条                                               */
        /* ================================================================ */
        #readingProgress {
            position:fixed; top:0; left:0; width:0%; height:2px;
            background:var(--accent); z-index:9999;
            transition:width .1s linear;
        }

        /*  方案一/三：文章内目录 (TOC) */
        .toc-wrap {
            background:var(--bg-soft); border:1px solid var(--border);
            border-radius:6px; padding:14px 18px; margin-bottom:24px;
            font-size:.82rem;
        }
        .toc-wrap .toc-title {
            font-weight:600; margin-bottom:8px; color:var(--text);
            font-size:.85rem;
        }
        .toc-wrap a {
            display:block; padding:4px 0; color:var(--text-secondary);
            text-decoration:none; transition:color .15s;
            border-left:2px solid transparent; padding-left:10px;
        }
        .toc-wrap a:hover, .toc-wrap a.active {
            color:var(--accent); border-left-color:var(--accent);
            background:var(--accent-soft);
        }
        .toc-wrap a.toc-h3 { padding-left:24px; font-size:.76rem; }

        /*  方案一：代码高亮（复用全局变量） */
        .art-body pre code {
            font-family:var(--font-mono); font-size:.8rem; line-height:1.7;
        }

        /*  方案一：图片灯箱 */
        #imgLightbox {
            position:fixed; inset:0; z-index:10000;
            background:rgba(0,0,0,.88); display:none; place-items:center;
        }
        #imgLightbox img {
            max-width:92vw; max-height:90vh; border-radius:4px;
            cursor:pointer; object-fit:contain;
        }
        #imgLightbox .lb-close {
            position:absolute; top:20px; right:24px;
            width:36px; height:36px; display:grid; place-items:center;
            font-size:1.4rem; color:#fff; cursor:pointer;
            border-radius:50%; background:rgba(255,255,255,.12);
            transition:background .2s;
        }
        #imgLightbox .lb-close:hover { background:rgba(255,255,255,.22); }

        /* ================================================================ */
        /*  方案二：页面切换动画 & 滚动渐入                                  */
        /* ================================================================ */
        @keyframes slideUpFade {
            from { opacity:0; transform:translateY(12px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .reveal {
            opacity:0; transform:translateY(18px);
            transition:opacity .5s ease, transform .5s ease;
        }
        .reveal.visible {
            opacity:1; transform:translateY(0);
        }

        .view-enter { animation:fadeIn .2s ease both; }

        /* ================================================================ */
        /*  方案三：文章卡片化                                                */
        /* ================================================================ */
        .art-card {
            display:flex; align-items:baseline; gap:14px;
            padding:14px 10px; border-bottom:1px solid var(--border);
            cursor:pointer; transition:background .15s; border-radius:4px;
            margin:0 -10px 4px;
        }
        .art-card:hover { background:var(--bg-soft); }
        .art-card .art-date {
            width:72px; flex-shrink:0; font-size:.75rem;
            color:var(--text-dim); font-family:var(--font-mono);
            text-align:right; padding-top:2px;
        }
        .art-card .art-title {
            font-size:.95rem; font-weight:500; color:var(--text);
            flex:1;
        }
        .art-card .art-hint {
            font-size:.72rem; color:var(--text-dim);
            white-space:nowrap; margin-left:8px;
        }

        /* ================================================================ */
        /*  方案四：回到顶部按钮                                              */
        /* ================================================================ */
        #backToTop {
            position:fixed; bottom:28px; right:28px; z-index:9000;
            width:40px; height:40px; border-radius:50%;
            background:var(--accent-soft); color:var(--accent);
            border:1px solid var(--accent);
            display:grid; place-items:center;
            font-size:1.1rem; cursor:pointer;
            opacity:0; transform:translateY(12px);
            transition:opacity .3s, transform .3s;
            pointer-events:none;
        }
        #backToTop.show {
            opacity:1; transform:translateY(0);
            pointer-events:auto;
        }
        #backToTop:hover { background:var(--accent); color:#fff; }

        /* ================================================================ */
        /*  方案四：文章搜索条                                               */
        /* ================================================================ */
        .search-bar {
            margin-bottom:20px; position:relative;
        }
        .search-bar input {
            width:100%; padding:10px 14px; border:1px solid var(--border);
            border-radius:6px; background:var(--bg); color:var(--text);
            font-size:.88rem; outline:none; font-family:inherit;

        .gh-editor-tab.active {
            color: var(--text); background: var(--bg);

    <script>
        // ================================================================
        //  CONFIG
        // ================================================================
        
        const QUOTES = [
            '关关雎鸠，在河之洲',
            '桃之夭夭，灼灼其华',
            '昔我往矣，杨柳依依',
            '蒹葭苍苍，白露为霜',
            '采采芣苡，薄言采之',
            '青青子衿，悠悠我心',
            '所谓伊人，在水一方',
            '知我者，谓我心忧',
            '他山之石，可以攻玉',
            '靡不有初，鲜克有终',
            '高山仰止，景行行止',
            '行到水穷处，坐看云起时',
            '晚来天欲雪，能饮一杯无',
            '人生如逆旅，我亦是行人',
            '小舟从此逝，江海寄余生',
            '且将新火试新茶，诗酒趁年华'
        ];

        // ================================================================
        //  STATE
        // ================================================================
        let currentView = 'home';
        let isLoggedIn = false;
        let articles = [];
        let editingId = null;
        let musicPlaylist = [];
        let musicIndex = 0;
        let audio = null;

        // ================================================================
        //  DOM REFS
        // ================================================================
        const $ = id => document.getElementById(id);
        const get = (sel, ctx) => (ctx||document).querySelector(sel);
        const getAll = (sel, ctx) => (ctx||document).querySelectorAll(sel);

        // ================================================================
        //  INIT
        // ================================================================
        document.addEventListener('DOMContentLoaded', async () => {
            await initDB();
            await loadArticles();
            loadState();
            initTheme();
            initViews();
            initLogin();
            initArticles();
            initGitHub();
            initMusic();
            initQuote();
            initOptimizations();
            initMarkdownEditor();
            renderHomeRecent();
            renderArticleList();
            renderTimelineList();
        });

        // ====== IndexedDB 存储 ======
        let db;
        function initDB() {
            return new Promise((ok, fail) => {
                const r = indexedDB.open('yfy_blog', 2);
                r.onupgradeneeded = e => {
                    const d = e.target.result;
                    if (!d.objectStoreNames.contains('articles')) {
                        d.createObjectStore('articles', { keyPath: 'id' });
                    }
                };
                r.onsuccess = e => { db = e.target.result; ok(); };
                r.onerror = () => fail(r.error);
            });
        }
        function dbAll() {
            return new Promise((ok, fail) => {
                const tx = db.transaction('articles', 'readonly');
                const req = tx.objectStore('articles').getAll();
                req.onsuccess = () => ok(req.result || []);
                req.onerror = () => fail(req.error);
            });
        }
        function dbPut(a) {
            return new Promise((ok, fail) => {
                const tx = db.transaction('articles', 'readwrite');
                const req = tx.objectStore('articles').put(a);
                req.onsuccess = ok;
                req.onerror = () => fail(req.error);
            });
        }
        function dbDel(id) {
            return new Promise((ok, fail) => {
                const tx = db.transaction('articles', 'readwrite');
                const req = tx.objectStore('articles').delete(id);
                req.onsuccess = ok;
                req.onerror = () => fail(req.error);
            });
        }
        async function loadArticles() {
            // Try to sync with GitHub articles.json first (Cross-device cloud DB)
            const ghToken = localStorage.getItem('blog_gh_token');
            const owner = 'eliyfy';
            const repo = 'yfy_blog';
            
            try {
                // Fetch public json from rawgithub or github pages to ensure any user sees it
                // We append a timestamp to prevent caching
                const res = await fetch(`https://raw.githubusercontent.com/${owner}/${repo}/main/articles.json?t=${Date.now()}`);
                if (res.ok) {
                    const cloudArticles = await res.json();
                    if (Array.isArray(cloudArticles)) {
                        // Sync cloud to IndexedDB
                        // Clear current store first
                        const tx = db.transaction('articles', 'readwrite');
                        const store = tx.objectStore('articles');
                        await new Promise((resolve) => {
                            const req = store.clear();
                            req.onsuccess = resolve;
                        });
                        
                        // Put all cloud articles into IndexedDB
                        for (const a of cloudArticles) {
                            await dbPut(a);
                        }
                        console.log("✓ Synchronized articles from GitHub Cloud!");
                    }
                }
            } catch(e) {
                console.log("Cloud sync failed or offline, loading from local IndexedDB:", e.message);
            }

            let arr = await dbAll();
            // Migrating old localStorage data
            const old = localStorage.getItem('blog_articles');
            if (old) {
                try {
                    const oldArr = JSON.parse(old);
                    for (const a of oldArr) {
                        if (!a.id) a.id = 'a_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
                        await dbPut(a);
                    }
                    localStorage.removeItem('blog_articles');
                    arr = await dbAll();
                } catch(e) {}
            }
            articles = arr.sort((a,b) => a.ts - b.ts);
        }

        // ====== 时间线视图 ======
        function renderTimelineList() {
            const list = $('timelineList');
            if (!list) return;
            const tl = $('timelineView');
            if (!tl) return;
            tl.classList.toggle('hidden', !isLoggedIn);
            if (!isLoggedIn) return;

            if (!articles.length) {
                list.innerHTML = '<div class="tl-empty">时间线为空，写点东西吧</div>';
                return;
            }
            let html = '';
            const reversed = [...articles].reverse();
            reversed.forEach((a, i) => {
                const d = new Date(a.ts);
                const dateStr = d.getFullYear() + '-' +
                    String(d.getMonth()+1).padStart(2,'0') + '-' +
                    String(d.getDate()).padStart(2,'0');
                const timeStr = String(d.getHours()).padStart(2,'0') + ':' +
                    String(d.getMinutes()).padStart(2,'0');
                const cls = i === 0 ? ' tl-first' : '';
                html += '<div class="tl-item' + cls + '">';
                html += '<div class="tl-dot"></div>';
                html += '<div class="tl-card">';
                html += '<div class="tl-date">' + dateStr + ' <span>' + timeStr + '</span></div>';
                html += '<div class="tl-title" onclick="openArticle(\'' + a.id + '\')">' + escHtml(a.title) + '</div>';
                if (a.excerpt) html += '<div class="tl-excerpt">' + escHtml(a.excerpt.slice(0, 120)) + '</div>';
                if (isLoggedIn) {
                    html += '<div class="tl-actions">';
                    html += '<span onclick="openTimelineEditor(\'' + a.id + '\')">编辑</span>';
                    html += '<span onclick="delTimelineArticle(\'' + a.id + '\')">删除</span>';
                    html += '</div>';
                }
                html += '</div></div>';
            });
            list.innerHTML = html;
        }

        async function delTimelineArticle(id) {
            if (!confirm('删除这篇文章？')) return;
            await dbDel(id);
            await loadArticles();
            renderTimelineList();
            renderArticleList();
            renderTimelineList();
            renderHomeRecent();
            toast('已删除');
        }

        function openTimelineEditor(id) {
            const a = articles.find(x => x.id === id);
            if (!a) return;
            editorIdx = articles.indexOf(a);
            $('editorTitle').value = a.title || '';
            $('editorCat').value = a.cat || '';
            $('editorText').value = a.content || '';
            $('editorModal').classList.add('open');
        }

        function loadState() {
            const savedLogin = localStorage.getItem('blog_login');
            if (savedLogin === 'true') setLoggedIn(true);
        }

        function saveState() {} // deprecated, now using IndexedDB

        // ================================================================
        //  THEME
        // ================================================================
        function initTheme() {
            const saved = localStorage.getItem('blog_theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
            $('themeToggle').textContent = saved === 'dark' ? '◎' : '○';
            $('themeToggle').addEventListener('click', () => {
                const cur = document.documentElement.getAttribute('data-theme');
                const next = cur === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('blog_theme', next);
                $('themeToggle').textContent = next === 'dark' ? '◎' : '○';
            });
        }

        // ================================================================
        //  VIEWS
        // ================================================================
        function initViews() {
            getAll('[data-view]').forEach(el => {
                el.addEventListener('click', e => {
                    e.preventDefault();
                    const v = el.dataset.view;
                    if (v === 'toolbox' && !isLoggedIn) return;
                    switchView(v);
                });
            });
        }

        function switchView(name) {
            if (name === 'toolbox' && !isLoggedIn) return;
            currentView = name;
            getAll('.view').forEach(v => {
                v.classList.remove('active');
                v.classList.remove('view-enter');
            });
            const target = $('view-' + name);
            if (target) {
                target.classList.add('active');
                target.classList.add('view-enter');
                setTimeout(() => target.classList.remove('view-enter'), 250);
            }
            getAll('[data-view]').forEach(a => a.classList.remove('active'));
            const navLink = document.querySelector(`[data-view="${name}"]`);
            if (navLink) navLink.classList.add('active');
            window.scrollTo({top:0,behavior:'smooth'});
        }

        // ================================================================
        //  LOGIN
        // ================================================================
        function initLogin() {
            const savedLogin = localStorage.getItem('blog_login');
            const savedToken = localStorage.getItem('blog_gh_token');

        function openArticle(idx) {
            const a = articles[idx];
            if (!a) return;
            $('modalTitle').textContent = a.title;
            
            const wordCount = a.content.replace(/<[^>]*>/g, '').length;
            const readMin = Math.max(1, Math.ceil(wordCount / 400));
            $('modalMeta').textContent = (a.tag ? a.tag + ' · ' : '') + a.date + ' · ' + readMin + ' min read';
            
            // Render with marked.js GFM
            let renderedHtml = '';
            if (typeof marked !== 'undefined') {
                renderedHtml = marked.parse(a.content);
            } else {
                renderedHtml = escHtml(a.content).replace(/\n/g, '<br/>');
            }
            
            // Extract TOC from rendered H1, H2, H3
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = renderedHtml;
            const headers = tempDiv.querySelectorAll('h1, h2, h3');
            let tocHtml = '';
            
            if (headers.length >= 2) {
                tocHtml = '<div class="toc-wrap"><div class="toc-title">📑 目录</div>';
                headers.forEach((h, hIdx) => {
                    const id = 'toc-anchor-' + hIdx;
                    h.setAttribute('id', id);
                    const levelClass = h.tagName === 'H3' ? 'toc-h3' : 'toc-h2';
                    tocHtml += '<a href="#" class="' + levelClass + '" data-toc="' + id + '">' + escHtml(h.textContent) + '</a>';
                });
                tocHtml += '</div>';
            }
            
            $('modalContent').innerHTML = tocHtml + tempDiv.innerHTML;
            
            // Code block highlighting
            if (typeof hljs !== 'undefined') {
                $('modalContent').querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }
            
            // Bind TOC scroll
            $('modalContent').querySelectorAll('.toc-wrap a').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const targetId = link.getAttribute('data-toc');
                    const targetEl = $('modalContent').querySelector('#' + targetId);
                    if (targetEl) {
                        targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
            });
            
            $('articleModal').classList.add('open');
            initReadingProgress();
            if (typeof initLightbox === 'function') initLightbox();
        }

        async function saveArticle() {
            const title = $('editTitle').value.trim();
            const tag = $('editTag').value.trim();
            const content = $('editContent').value.trim();

            if (!title || !content) { toast('请填写标题和内容', 'e'); return; }

            const id = editingId !== null ? articles[editingId].id : 'a_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
            const ts = editingId !== null ? articles[editingId].ts : Date.now();
            const date = editingId !== null ? articles[editingId].date : new Date().toISOString().split('T')[0];

            const a = { id, title, tag, content, ts, date };

            try {
                await dbPut(a);
                toast('本地保存成功');
                
                // Now attempt to push to GitHub
                const token = localStorage.getItem('blog_gh_token') || localStorage.getItem('github_token');
                const owner = 'eliyfy';
                const repo = 'yfy_blog';
                
                if (token) {
                    toast('正在同步至 GitHub 云端...');
                    // Reload all articles to get the latest list to push
                    let allArr = await dbAll();
                    allArr = allArr.sort((x, y) => x.ts - y.ts);
                    
                    const filePath = 'articles.json';
                    const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`;
                    
                    // 1. Get existing file SHA if it exists
                    let sha = null;
                    try {
                        const getRes = await fetch(apiUrl, {
                            headers: { 'Authorization': `token ${token}` }
                        });
                        if (getRes.ok) {
                            const getData = await getRes.json();
                            sha = getData.sha;
                        }
                    } catch(err) {
                        console.log("No existing cloud file to fetch SHA");
                    }
                    
                    // 2. Put the updated articles.json
                    const fileContent = btoa(unescape(encodeURIComponent(JSON.stringify(allArr, null, 2))));
                    const body = {
                        message: `Update articles.json via Admin Editor [skip ci]`,
                        content: fileContent,
                        branch: 'main'
                    };
                    if (sha) body.sha = sha;
                    
                    const putRes = await fetch(apiUrl, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(body)
                    });
                    
                    if (putRes.ok) {
                        toast('✨ 已同步至云端并成功保存！');
                    } else {
                        const errData = await putRes.json();
                        toast('同步失败: ' + (errData.message || '未知错误'), 'e');
                    }
                } else {
                    toast('本地保存成功！(连结 GitHub 后可全自动同步云端)');
                }
                
                closeEditor();
                await loadArticles();
                renderArticleList();
                renderHomeRecent();
                renderTimelineList();
            } catch(e) {
                toast('操作失败: ' + e.message, 'e');
            }
        }

        const MUSIC_SORTS = ['热歌榜','新歌榜','飙升榜','抖音榜','电音榜'];

        function initMusic() {
            audio = new Audio();
            audio.volume = 0.6;

            loadMusicPlaylist();

            // Controls
            $('playBtn').addEventListener('click', togglePlay);

                if (audio.duration) {
                    const pct = (audio.currentTime / audio.duration) * 100;
                    $('progressBar').style.width = pct + '%';
                }
            });
            audio.addEventListener('ended', () => playIndex(musicIndex + 1));

            $('playerProgress').addEventListener('click', e => {
                const rect = e.currentTarget.getBoundingClientRect();
                const pct = (e.clientX - rect.left) / rect.width;
                if (audio.duration) {

                }

        async function loadMusicPlaylist() {
            const songs = [];
            for (const sort of MUSIC_SORTS) {
                try {
                    const res = await fetch('https://api.uomg.com/api/rand.music?sort=' + encodeURIComponent(sort) + '&format=json');
                    const data = await res.json();
                    if (data.code === 1 && data.data && data.data.url) {
                        songs.push({
                            name: data.data.name || '未知歌曲',
                            artist: data.data.artistsname || data.data.singername || '未知歌手',
                            url: data.data.url,
                            pic: data.data.pic || ''
                        });
                    }
                } catch(e) {}
            }
            if (songs.length > 0) {
                musicPlaylist = songs;
                playIndex(0);
            } else {
                // Fallback - use some built-in free music URLs
                musicPlaylist = [
                    { name:'起风了', artist:'买辣椒也用券', url:'https://music.163.com/song/media/outer/url?id=1330348068.mp3' },
                    { name:'光年之外', artist:'G.E.M.邓紫棋', url:'https://music.163.com/song/media/outer/url?id=474436604.mp3' },
                ];
                playIndex(0);
            }
        }

        function playIndex(idx) {
            if (!musicPlaylist.length) return;
            if (idx < 0) idx = musicPlaylist.length - 1;
            if (idx >= musicPlaylist.length) idx = 0;
            musicIndex = idx;
            const song = musicPlaylist[idx];
            $('songName').textContent = song.name;
            $('artistName').textContent = song.artist;
            $('playBtn').textContent = '...';
            try {
                audio.src = song.url;
                audio.play().then(() => {
                    $('playBtn').textContent = '||'; // pause
                }).catch(() => {
                    $('playBtn').textContent = '...';
                });
            } catch(e) {
                $('playBtn').textContent = '...';
            }
        }

        function togglePlay() {
            if (!audio.src) { playIndex(musicIndex); return; }
            if (audio.paused) {
                audio.play().then(() => $('playBtn').textContent = '⏸').catch(()=>{});
            } else {
                audio.pause();
                $('playBtn').textContent = '...';
            }
        }

        // Music search using uomg API
        async function musicSearch() {
            const keyword = prompt('搜索歌曲：');
            if (!keyword || !keyword.trim()) return;
            toast('正在搜索...');
            try {
                // Using Meting Netease Search API (Zero CORS restriction)
                const searchUrl = 'https://api.i-meto.com/meting/api?server=netease&type=search&keyword=' + encodeURIComponent(keyword.trim());
                const res = await fetch(searchUrl);
                const results = await res.json();
                
                if (results && results.length) {
                    const sliced = results.slice(0, 10);
                    let msg = '搜索结果：\n';
                    sliced.forEach((s, i) => {
                        msg += (i+1) + '. ' + s.title + ' - ' + s.author + '\n';
                    });
                    msg += '\n输入序号播放 (1-' + sliced.length + ')，或取消';
                    
                    const choice = prompt(msg);
                    const idx = parseInt(choice) - 1;
                    if (idx >= 0 && idx < sliced.length) {
                        const s = sliced[idx];
                        // Extract netease play url directly or fallback
                        const playUrl = s.url || `https://music.163.com/song/media/outer/url?id=${s.id}.mp3`;
                        
                        // Populate music playlist
                        musicPlaylist = [{
                            name: s.title || '未知歌名',
                            artist: s.author || '未知歌手',
                            url: playUrl,
                            pic: s.pic || ''
                        }];
                        playIndex(0);
                        toast('开始播放: ' + (s.title));
                    }
                } else {
                    toast('未搜索到相关歌曲', 'e');
                }
            } catch(e) {
                toast('搜索失败: ' + e.message, 'e');
            }
        }

        // ================================================================

        // ================================================================
        function initReadingProgress() {
            const modal = $('articleModal');
            const progress = $('readingProgress');
            if (!modal || !progress) return;
            
            modal.addEventListener('scroll', () => {
                const total = modal.scrollHeight - modal.clientHeight;
                if (total <= 0) {
                    progress.style.width = '0%';
                    return;
                }
                const current = modal.scrollTop;
                const percentage = Math.min(100, Math.max(0, (current / total) * 100));
                progress.style.width = percentage + '%';
            }, {passive: true});
            
            // Reset on close
            $('modalClose').addEventListener('click', () => {
                progress.style.width = '0%';
            });
            modal.addEventListener('click', (e) => {
                if (e.target === modal) progress.style.width = '0%';
            });
        }

        function initStickyHeader() {
            const page = document.querySelector('.page');
            const header = document.querySelector('.header');
            if (!header) return;
            
            window.addEventListener('scroll', () => {
                if (window.scrollY > 80) {
                    header.classList.add('sticky');

        }

                if (window.scrollY > 400) {

                } else {
                    btn.classList.remove('show');
                }
            }, {passive: true});
            
            btn.addEventListener('click', () => {

            });
        }

        function initScrollReveal() {
            const cards = document.querySelectorAll('.art-card, .home-section, .home-recent-item');
            if (cards.length === 0) return;
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
            
            cards.forEach(c => observer.observe(c));
        }

        function initLightbox() {
            const lightbox = $('imgLightbox');
            const lbImg = $('lbImg');
            if (!lightbox || !lbImg) return;
            
            const images = document.querySelectorAll('.art-body img, #modalContent img');
            images.forEach(img => {
                img.style.cursor = 'zoom-in';
                img.addEventListener('click', () => {
                    lbImg.src = img.src;
                    lightbox.style.display = 'grid';
                });
            });
            
            const close = () => { lightbox.style.display = 'none'; };
            lightbox.querySelector('.lb-close').addEventListener('click', close);
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) close();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && lightbox.style.display === 'grid') close();
            });
        }

        function initThemeHighlight() {
            const toggle = $('themeToggle');
            if (!toggle) return;
            const light = document.getElementById('hljsLight');
            const dark = document.getElementById('hljsDark');
            
            const updateHlTheme = () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                if (light && dark) {
                    light.disabled = isDark;
                    dark.disabled = !isDark;
                }
            };
            
            // Bind on click
            toggle.addEventListener('click', () => {
                setTimeout(updateHlTheme, 50);
            });
            // Initial run
            updateHlTheme();
        }

        function initOptimizations() {
            initStickyHeader();
            initBackToTop();
            initScrollReveal();
            initLightbox();
            initThemeHighlight();
        }

        
        // ================================================================
        //  GITHUB-STYLE MARKDOWN EDITOR LOGIC
        // ================================================================
        function initMarkdownEditor() {
            const textarea = $('editContent');
            const preview = $('ghEditorPreview');
            const tabWrite = $('ghTabWrite');
            const tabPreview = $('ghTabPreview');
            const toolbar = $('ghEditorToolbar');
            const wordCountSpan = $('ghWordCount');
            const readTimeSpan = $('ghReadTime');
            const modal = $('editorModal').querySelector('.modal');
            const zenBtn = $('ghZenBtn');

            if (!textarea) return;

            // Switch to Write Tab
            tabWrite.addEventListener('click', () => {
                tabPreview.classList.remove('active');
                tabWrite.classList.add('active');
                preview.classList.remove('active');
                textarea.style.display = 'block';
                textarea.focus();
            });

            // Switch to Preview Tab
            tabPreview.addEventListener('click', () => {
                tabWrite.classList.remove('active');
                tabPreview.classList.add('active');
                textarea.style.display = 'none';
                preview.classList.add('active');
                
                let html = '';
                if (typeof marked !== 'undefined') {
                    html = marked.parse(textarea.value);
                } else {
                    html = escHtml(textarea.value).replace(/\n/g, '<br/>');
                }
                preview.innerHTML = html || '<p style="color:var(--text-dim);font-style:italic">内容为空...</p>';
                
                if (typeof hljs !== 'undefined') {
                    preview.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });
                }
            });

            // Counter
            function updateWordCount() {
                const text = textarea.value;
                const charCount = text.length;
                const wordCount = text.trim() === '' ? 0 : text.replace(/<[^>]*>/g, '').length;
                const lines = text.split('\n').length;
                const readMin = Math.max(1, Math.ceil(wordCount / 400));
                wordCountSpan.textContent = charCount + ' chars | ' + lines + ' lines';
                readTimeSpan.textContent = 'Est. Read Time: ~' + readMin + ' min';
            }
            textarea.addEventListener('input', updateWordCount);

            // Command inserter
            function insertCommand(type) {
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                const origVal = textarea.value;
                const selectedText = origVal.substring(start, end);
                
                let inserted = '';
                let newCursorPos = start;

                switch(type) {
                    case 'bold':
                        inserted = '**' + (selectedText || 'bold text') + '**';
                        newCursorPos = selectedText ? end + 4 : start + 2;
                        break;
                    case 'italic':
                        inserted = '*' + (selectedText || 'italic text') + '*';
                        newCursorPos = selectedText ? end + 2 : start + 1;
                        break;
                    case 'h1':
                        inserted = '\n# ' + (selectedText || 'Heading 1') + '\n';
                        newCursorPos = start + 3;
                        break;
                    case 'h2':
                        inserted = '\n## ' + (selectedText || 'Heading 2') + '\n';
                        newCursorPos = start + 4;
                        break;
                    case 'h3':
                        inserted = '\n### ' + (selectedText || 'Heading 3') + '\n';
                        newCursorPos = start + 5;
                        break;
                    case 'quote':
                        inserted = '\n> ' + (selectedText || 'Quote text') + '\n';
                        newCursorPos = start + 3;
                        break;
                    case 'code':
                        inserted = '\n```javascript\n' + (selectedText || '// Code here') + '\n```\n';
                        newCursorPos = start + 15;
                        break;
                    case 'link':
                        inserted = '[' + (selectedText || 'GitHub link') + '](https://github.com)';
                        newCursorPos = selectedText ? start + 1 : start + 1;
                        break;
                    case 'list':
                        inserted = '\n- ' + (selectedText || 'List item') + '\n';
                        newCursorPos = start + 3;
                        break;
                    case 'numlist':
                        inserted = '\n1. ' + (selectedText || 'List item') + '\n';
                        newCursorPos = start + 4;
                        break;
                    case 'checklist':
                        inserted = '\n- [ ] ' + (selectedText || 'Task item') + '\n';
                        newCursorPos = start + 7;
                        break;
                    case 'table':
                        inserted = '\n| Header 1 | Header 2 |\n| -------- | -------- |\n| Cell 1   | Cell 2   |\n';
                        newCursorPos = start + 1;
                        break;
                }

                textarea.value = origVal.substring(0, start) + inserted + origVal.substring(end);
                textarea.focus();
                textarea.setSelectionRange(newCursorPos, newCursorPos + (selectedText ? selectedText.length : 0));
                updateWordCount();
            }

            toolbar.querySelectorAll('.gh-tb-btn').forEach(btn => {
                const cmd = btn.getAttribute('data-cmd');
                if (cmd === 'zen') return;
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    insertCommand(cmd);
                });
            });

            zenBtn.addEventListener('click', (e) => {
                e.preventDefault();
                modal.classList.toggle('zen-mode');
                zenBtn.textContent = modal.classList.contains('zen-mode') ? 'Normal ✕' : 'Zen ⚡';
            });

            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'b' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    insertCommand('bold');
                }
                if (e.key === 'i' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    insertCommand('italic');
                }
                if (e.key === 'k' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    insertCommand('link');
                }
            });

            window.resetGhEditor = function() {
                tabPreview.classList.remove('active');
                tabWrite.classList.add('active');
                preview.classList.remove('active');
                textarea.style.display = 'block';
                modal.classList.remove('zen-mode');
                zenBtn.textContent = 'Zen ⚡';
                updateWordCount();
            };
        }

        console.log('芸芣苡 · 博客 loaded');
    </script>
    <button id="backToTop" title="回到顶部">↑</button>
    <div id="imgLightbox"><span class="lb-close">&times;</span><img id="lbImg" src="" alt="" /></div>
</body>
</html>
